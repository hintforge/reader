contact_links:
  - name: Builder / authoring-side bug
    url: https://github.com/hintforge/builder/issues/new/choose
    about: For setup wizard, ingestion, stitch, zipper, corpus-format spec questions, or feature requests on the authoring side, file at hintforge instead.
  - name: Game-specific guide content
    url: https://github.com/hintforge/builder/issues/new/choose
